<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | Cuterain</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       CSS変数
    ============================================ */
    :root {
      --color-bg:        #F7DDE3;
      --color-bg-sub:    #F0CDD5;
      --color-accent:    #C4956A;
      --color-text:      #3D2B1F;
      --color-text-sub:  #7A6055;
      --color-white:     #FFFFFF;
      --font-serif-en:   'Cormorant Garamond', serif;
      --font-serif-jp:   'Noto Serif JP', serif;
      --font-sans:       'Zen Maru Gothic', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.8;
    }

    /* ============================================
       ヘッダー
    ============================================ */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 20px 40px;
      transition: background-color 0.4s ease, box-shadow 0.4s ease;
    }

    .header.scrolled {
      background-color: rgba(247, 221, 227, 0.95);
      box-shadow: 0 2px 20px rgba(61, 43, 31, 0.08);
      backdrop-filter: blur(8px);
    }

    .header__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ロゴ */
    .header__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .header__logo-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .header__logo-text {
      font-family: var(--font-serif-en);
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--color-text);
    }

    /* ナビゲーション */
    .nav-menu ul {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-menu ul li a {
      font-family: var(--font-serif-en);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--color-text);
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .nav-menu ul li a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--color-accent);
      transition: width 0.3s ease;
    }

    .nav-menu ul li a:hover::after {
      width: 100%;
    }

    /* ハンバーガーボタン */
    .header__menu-btn {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .header__menu-btn span {
      display: block;
      width: 24px;
      height: 2px;
      background-color: var(--color-text);
      transition: all 0.3s ease;
    }

    /* モバイルメニュー */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: var(--color-bg);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu a {
      font-family: var(--font-serif-en);
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      color: var(--color-text);
      text-decoration: none;
    }

    .mobile-menu-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--color-text);
    }

    /* ============================================
       ページヒーロー
    ============================================ */
    .page-hero {
      padding: 160px 40px 80px;
      text-align: center;
      background: linear-gradient(180deg, var(--color-bg-sub) 0%, var(--color-bg) 100%);
    }

    .page-hero-en {
      font-family: var(--font-serif-en);
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--color-text);
      display: block;
      margin-bottom: 16px;
    }

    .page-hero-jp {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      color: var(--color-text-sub);
      display: block;
    }

    /* ============================================
       メインコンテンツ
    ============================================ */
    .contact-main {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 40px 120px;
    }

    .contact-lead {
      text-align: center;
      margin-bottom: 64px;
    }

    .contact-lead p {
      font-size: 0.95rem;
      color: var(--color-text-sub);
      line-height: 2;
      letter-spacing: 0.05em;
    }

    .contact-lead .accent-line {
      display: inline-block;
      width: 40px;
      height: 1px;
      background-color: var(--color-accent);
      margin: 24px auto;
    }

    /* ============================================
       フォーム
    ============================================ */
    .contact-form {
      background-color: var(--color-white);
      border-radius: 16px;
      padding: 56px 48px;
      box-shadow: 0 8px 40px rgba(61, 43, 31, 0.08);
    }

    .form-group {
      margin-bottom: 32px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--color-text);
      margin-bottom: 10px;
    }

    .form-label .required {
      font-size: 0.7rem;
      background-color: var(--color-accent);
      color: var(--color-white);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 14px 18px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--color-text);
      background-color: var(--color-bg);
      border: 1.5px solid rgba(196, 149, 106, 0.3);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(196, 149, 106, 0.15);
    }

    .form-textarea {
      height: 180px;
      resize: vertical;
      line-height: 1.8;
    }

    .form-submit {
      width: 100%;
      padding: 18px;
      font-family: var(--font-serif-en);
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--color-white);
      background-color: var(--color-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      margin-top: 8px;
    }

    .form-submit:hover {
      background-color: var(--color-accent);
      transform: translateY(-2px);
    }

    .form-privacy {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--color-text-sub);
      letter-spacing: 0.05em;
    }

    /* ============================================
       フッター
    ============================================ */
    .footer {
      background-color: var(--color-text);
      color: var(--color-bg);
      text-align: center;
      padding: 48px 40px;
    }

    .footer-logo {
      font-family: var(--font-serif-en);
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
      display: block;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: rgba(247, 221, 227, 0.5);
      letter-spacing: 0.1em;
    }

    /* ============================================
       レスポンシブ
    ============================================ */
    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
      }

      .nav-menu {
        display: none;
      }

      .header__menu-btn {
        display: flex;
      }

      .page-hero {
        padding: 120px 20px 60px;
      }

      .contact-main {
        padding: 60px 20px 80px;
      }

      .contact-form {
        padding: 36px 24px;
      }
    }
    /* ============================================
   ヘッダー強制修正
============================================ */

/* ロゴ画像サイズ固定 */
.header__logo-img {
  width: 40px !important;
  height: 40px !important;
  max-width: 40px !important;
  max-height: 40px !important;
  object-fit: contain !important;
}

/* モバイルメニューを初期状態で非表示 */
.mobile-menu {
  display: none !important;
}

/* モバイルメニューを開いた時だけ表示 */
.mobile-menu.open {
  display: flex !important;
}

/* ハンバーガーボタンはPCでは非表示 */
@media (min-width: 769px) {
  .header__menu-btn {
    display: none !important;
  }
}

/* スマホでのみハンバーガー表示 */
@media (max-width: 768px) {
  .header__menu-btn {
    display: flex !important;
  }
  .nav-menu {
    display: none !important;
  }
}
    /* ============================================
   CONTACTヘッダー → HOMEに合わせる修正
============================================ */

/* ヘッダー背景を白に */
header,
.header,
.site-header {
  background-color: #ffffff !important;
  border-bottom: 2px solid #f5c6cb !important;
}

/* ロゴテキスト「Cuterain」の色とフォント */
.header__logo-text,
.logo-text,
header .logo a,
header a.logo {
  color: #e8a0b0 !important;
  font-family: 'Georgia', serif !important;
  font-weight: 300 !important;
  letter-spacing: 0.15em !important;
}

/* ナビゲーションリンクの色・フォント・間隔 */
.header__nav a,
.nav-menu a,
header nav a,
.gnav a {
  color: #7a6a6a !important;
  font-family: 'Georgia', serif !important;
  font-weight: 300 !important;
  letter-spacing: 0.2em !important;
  font-size: 0.85rem !important;
  text-decoration: none !important;
}

/* ナビリンクホバー */
.header__nav a:hover,
.nav-menu a:hover,
header nav a:hover {
  color: #e8a0b0 !important;
}
  </style>
</head>

<body>

  <!-- ========== HEADER ========== -->
  <header class="header" id="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo">
        <img src="logo.png" alt="Cuterain" class="header__logo-img" />
        <span class="header__logo-text">Cuterain</span>
      </a>

      <nav class="nav-menu">
        <ul>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#products">Products</a></li>
          <li><a href="index.html#story">Story</a></li>
          <li><a href="index.html#news">News</a></li>
          <li><a href="index.html#instagram">Instagram</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <button class="header__menu-btn" id="menuBtn" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- モバイルメニュー -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" id="menuClose">✕</button>
    <a href="index.html#about">About</a>
    <a href="index.html#products">Products</a>
    <a href="index.html#story">Story</a>
    <a href="index.html#news">News</a>
    <a href="index.html#instagram">Instagram</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- ページヒーロー -->
  <section class="page-hero">
    <span class="page-hero-en">Contact</span>
    <span class="page-hero-jp">お問い合わせ</span>
  </section>

  <!-- メインコンテンツ -->
  <main class="contact-main">

    <div class="contact-lead">
      <p>
        ご質問・ご要望・コラボレーションのご相談など、<br>
        お気軽にお問い合わせください。<br>
        通常3営業日以内にご返信いたします。
      </p>
      <span class="accent-line"></span>
    </div>

    <form
      class="contact-form"
      id="contactForm"
      action="https://formspree.io/f/xojordek"
      method="POST"
    >
      <!-- お名前 -->
      <div class="form-group">
        <label class="form-label" for="name">
          お名前 <span class="required">必須</span>
        </label>
        <input class="form-input" type="text" id="name" name="name" placeholder="例）山田 花子" required>
      </div>

      <!-- メールアドレス -->
      <div class="form-group">
        <label class="form-label" for="email">
          メールアドレス <span class="required">必須</span>
        </label>
        <input class="form-input" type="email" id="email" name="email" placeholder="例）hello@example.com" required>
      </div>

      <!-- 件名 -->
      <div class="form-group">
        <label class="form-label" for="subject">
          件名 <span class="required">必須</span>
        </label>
        <input class="form-input" type="text" id="subject" name="subject" placeholder="例）商品について" required>
      </div>

      <!-- メッセージ -->
      <div class="form-group">
        <label class="form-label" for="message">
          メッセージ <span class="required">必須</span>
        </label>
        <textarea class="form-textarea" id="message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
      </div>

      <input type="hidden" name="_next" value="https://cuterain0910.github.io/cuterain.jp/contact.html?sent=true">
      <input type="hidden" name="_subject" value="【Cuterain】お問い合わせが届きました">
      <input type="text" name="_gotcha" style="display:none">

      <button type="submit" class="form-submit">Send Message</button>

      <p class="form-privacy">
        送信いただいた個人情報は、お問い合わせへの返信にのみ使用いたします。
      </p>
    </form>

  </main>

  <!-- フッター -->
  <footer class="footer">
    <span class="footer-logo">Cuterain</span>
    <p class="footer-copy">© 2025 Cuterain. All rights reserved.</p>
  </footer>

  <!-- JS -->
  <script>
    // ヘッダースクロール
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // ハンバーガーメニュー
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const menuClose = document.getElementById('menuClose');

    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.add('open');
    });

    menuClose.addEventListener('click', () => {
      mobileMenu.classList.remove('open');
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
      });
    });
  </script>

</body>
</html>
