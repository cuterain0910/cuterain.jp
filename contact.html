<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | Cuterain</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       CSS変数（index.htmlと統一）
    ============================================ */
    :root {
      --color-bg:        #F7DDE3;
      --color-bg-sub:    #F0CDD5;
      --color-accent:    #C4956A;
      --color-text:      #3D2B1F;
      --color-text-sub:  #7A6055;
      --color-white:     #FFFFFF;
      --font-serif-en:   'Cormorant Garamond', serif;
      --font-serif-jp:   'Noto Serif JP', serif;
      --font-sans:       'Zen Maru Gothic', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.8;
    }

    /* ============================================
       ヘッダー
    ============================================ */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 20px 40px;
      background-color: rgba(247, 221, 227, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(196, 149, 106, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-logo {
      font-family: var(--font-serif-en);
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--color-text);
      text-decoration: none;
    }

    .header-nav a {
      font-family: var(--font-serif-en);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--color-text-sub);
      text-decoration: none;
      margin-left: 32px;
      transition: color 0.3s ease;
    }

    .header-nav a:hover {
      color: var(--color-accent);
    }

    /* ============================================
       ページヒーロー
    ============================================ */
    .page-hero {
      padding: 160px 40px 80px;
      text-align: center;
      background: linear-gradient(
        180deg,
        var(--color-bg-sub) 0%,
        var(--color-bg) 100%
      );
    }

    .page-hero-en {
      font-family: var(--font-serif-en);
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--color-text);
      display: block;
      margin-bottom: 16px;
    }

    .page-hero-jp {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      color: var(--color-text-sub);
      display: block;
    }

    /* ============================================
       メインコンテンツ
    ============================================ */
    .contact-main {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 40px 120px;
    }

    /* リード文 */
    .contact-lead {
      text-align: center;
      margin-bottom: 64px;
    }

    .contact-lead p {
      font-size: 0.95rem;
      color: var(--color-text-sub);
      line-height: 2;
      letter-spacing: 0.05em;
    }

    .contact-lead .accent-line {
      display: inline-block;
      width: 40px;
      height: 1px;
      background-color: var(--color-accent);
      margin: 24px auto;
    }

    /* ============================================
       フォーム
    ============================================ */
    .contact-form {
      background-color: var(--color-white);
      border-radius: 16px;
      padding: 56px 48px;
      box-shadow: 0 8px 40px rgba(61, 43, 31, 0.08);
    }

    .form-group {
      margin-bottom: 32px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--color-text);
      margin-bottom: 10px;
    }

    .form-label .required {
      font-size: 0.7rem;
      background-color: var(--color-accent);
      color: var(--color-white);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 14px 18px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--color-text);
      background-color: var(--color-bg);
      border: 1.5px solid rgba(196, 149, 106, 0.3);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(196, 149, 106, 0.15);
    }

    .form-textarea {
      height: 180px;
      resize: vertical;
      line-height: 1.8;
    }

    /* 送信ボタン */
    .form-submit {
      width: 100%;
      padding: 18px;
      font-family: var(--font-serif-en);
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--color-white);
      background-color: var(--color-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      margin-top: 8px;
    }

    .form-submit:hover {
      background-color: var(--color-accent);
      transform: translateY(-2px);
    }

    .form-submit:active {
      transform: translateY(0);
    }

    /* プライバシーポリシー */
    .form-privacy {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--color-text-sub);
      letter-spacing: 0.05em;
    }

    /* ============================================
       送信完了メッセージ（Formspree用）
    ============================================ */
    .form-success {
      display: none;
      text-align: center;
      padding: 48px;
      background-color: var(--color-white);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(61, 43, 31, 0.08);
    }

    .form-success .success-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .form-success h3 {
      font-family: var(--font-serif-en);
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--color-text);
      margin-bottom: 12px;
    }

    .form-success p {
      font-size: 0.9rem;
      color: var(--color-text-sub);
      line-height: 2;
    }

    /* ============================================
       フッター
    ============================================ */
    .footer {
      background-color: var(--color-text);
      color: var(--color-bg);
      text-align: center;
      padding: 48px 40px;
    }

    .footer-logo {
      font-family: var(--font-serif-en);
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
      display: block;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: rgba(247, 221, 227, 0.5);
      letter-spacing: 0.1em;
    }

    /* ============================================
       レスポンシブ
    ============================================ */
    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
      }

      .header-nav {
        display: none;
      }

      .page-hero {
        padding: 120px 20px 60px;
      }

      .contact-main {
        padding: 60px 20px 80px;
      }

      .contact-form {
        padding: 36px 24px;
      }
    }
  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header class="header">
    <a href="index.html" class="header-logo">Cuterain</a>
    <nav class="header-nav">
      <a href="index.html">HOME</a>
      <a href="index.html#about">ABOUT</a>
      <a href="index.html#products">PRODUCTS</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </header>

  <!-- ページヒーロー -->
  <section class="page-hero">
    <span class="page-hero-en">Contact</span>
    <span class="page-hero-jp">お問い合わせ</span>
  </section>

  <!-- メインコンテンツ -->
  <main class="contact-main">

    <!-- リード文 -->
    <div class="contact-lead">
      <p>
        ご質問・ご要望・コラボレーションのご相談など、<br>
        お気軽にお問い合わせください。<br>
        通常3営業日以内にご返信いたします。
      </p>
      <span class="accent-line"></span>
    </div>

    <!-- お問い合わせフォーム（Formspree） -->
    <!-- ⚠️ YOUR_FORM_IDを後で変更してください -->
    <form
      class="contact-form"
      id="contactForm"
      action="https://formspree.io/f/xojordek"
      method="POST"
    >

      <!-- お名前 -->
      <div class="form-group">
        <label class="form-label" for="name">
          お名前
          <span class="required">必須</span>
        </label>
        <input
          class="form-input"
          type="text"
          id="name"
          name="name"
          placeholder="例）山田 花子"
          required
        >
      </div>

      <!-- メールアドレス -->
      <div class="form-group">
        <label class="form-label" for="email">
          メールアドレス
          <span class="required">必須</span>
        </label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="例）hello@example.com"
          required
        >
      </div>

      <!-- 件名 -->
      <div class="form-group">
        <label class="form-label" for="subject">
          件名
          <span class="required">必須</span>
        </label>
        <input
          class="form-input"
          type="text"
          id="subject"
          name="subject"
          placeholder="例）商品について"
          required
        >
      </div>

      <!-- メッセージ -->
      <div class="form-group">
        <label class="form-label" for="message">
          メッセージ
          <span class="required">必須</span>
        </label>
        <textarea
          class="form-textarea"
          id="message"
          name="message"
          placeholder="お問い合わせ内容をご記入ください"
          required
        ></textarea>
      </div>

      <!-- Formspree用リダイレクト -->
      <input type="hidden" name="_next" value="https://cuterain0910.github.io/cuterain.jp/contact.html?sent=true">
      <input type="hidden" name="_subject" value="【Cuterain】お問い合わせが届きました">
      <input type="text" name="_gotcha" style="display:none">

      <!-- 送信ボタン -->
      <button class="form-submit" type="submit">
        SEND MESSAGE
      </button>

      <!-- プライバシー -->
      <p class="form-privacy">
        送信いただいた個人情報は、お問い合わせへの返信のみに使用します。
      </p>

    </form>

  </main>

  <!-- フッター -->
  <footer class="footer">
    <span class="footer-logo">Cuterain</span>
    <p class="footer-copy">© 2024 Cuterain. All rights reserved.</p>
  </footer>

  <script>
    // 送信完了チェック（URLパラメータで判定）
    if (window.location.search.includes('sent=true')) {
      document.getElementById('contactForm').style.display = 'none';
      document.querySelector('.contact-lead').style.display = 'none';
    }
  </script>

</body>
</html>
